name: Phase 0 Bootstrap

on:
  push:
    branches:
      - quality/v1-2-release-hardening

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: quality/v1-2-release-hardening
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate deterministic lockfile
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit lockfile
        run: |
          if git diff --quiet -- package-lock.json && git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: add deterministic npm lockfile"
          git push origin HEAD:quality/v1-2-release-hardening
