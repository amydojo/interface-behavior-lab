name: Phase 0 Generate Baselines

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/report-bundle.mjs --write-baseline
      - run: npx playwright install --with-deps chromium
      - run: npm run test:visual -- --update-snapshots
      - name: Upload deterministic baselines
        uses: actions/upload-artifact@v4
        with:
          name: phase0-baselines
          path: |
            budgets/baseline.json
            tests/browser/**/*-snapshots
          if-no-files-found: error
          retention-days: 1
