name: Phase 0 Generate Baselines

on:
  push:
    branches:
      - quality/v1-2-release-hardening

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: quality/v1-2-release-hardening
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/report-bundle.mjs --write-baseline
      - run: npx playwright install --with-deps chromium
      - run: npm run test:visual -- --update-snapshots
      - name: Commit deterministic baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add budgets/baseline.json tests/browser/**/*-snapshots
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "test: record V1.1 visual and bundle baselines"
          git push origin HEAD:quality/v1-2-release-hardening
