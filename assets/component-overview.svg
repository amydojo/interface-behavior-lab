<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="620" viewBox="0 0 1440 620" role="img" aria-labelledby="title desc"><title id="title">Six adaptive control families</title><desc id="desc">Intent, Pressure, Breathing, Magnetic, Ethical, and Reversible control specimens.</desc><defs><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity=".12"/></filter><linearGradient id="b" x1="0" x2="1"><stop stop-color="#dce8ff"/><stop offset="1" stop-color="#9ebcff"/></linearGradient><linearGradient id="r" x1="0" x2="1"><stop stop-color="#ffdada"/><stop offset="1" stop-color="#ffaaa7"/></linearGradient><linearGradient id="g" x1="0" x2="1"><stop stop-color="#dcf6e9"/><stop offset="1" stop-color="#a9e4ca"/></linearGradient></defs><rect width="1440" height="620" fill="#f5f7fa"/><text x="64" y="68" font-family="Arial,sans-serif" font-size="15" letter-spacing="3" fill="#7c8797">ADAPTIVE CONTROLS / SIX BEHAVIORAL FAMILIES</text>
<g font-family="Arial,sans-serif" filter="url(#s)">
<g transform="translate(64 116)"><rect width="410" height="190" rx="30" fill="#fff" stroke="#dce1e8"/><text x="24" y="38" font-size="12" fill="#8b95a4">01</text><text x="24" y="68" font-size="15" font-weight="700">INTENT</text><text x="24" y="94" font-size="12" fill="#7b8491">reveals the exact consequence</text><rect x="24" y="120" width="362" height="48" rx="24" fill="url(#b)" stroke="#4c86ff"/><text x="44" y="149" font-size="14">Save to Journal</text><circle cx="360" cy="144" r="16" fill="#2875ff"/><text x="354" y="149" fill="#fff">→</text></g>
<g transform="translate(515 116)"><rect width="410" height="190" rx="30" fill="#fff" stroke="#dce1e8"/><text x="24" y="38" font-size="12" fill="#8b95a4">02</text><text x="24" y="68" font-size="15" font-weight="700">PRESSURE</text><text x="24" y="94" font-size="12" fill="#7b8491">depth becomes staged consequence</text><rect x="24" y="120" width="362" height="48" rx="24" fill="url(#r)" stroke="#ff5c57"/><text x="44" y="149" font-size="14">Delete Permanently</text><g fill="#ff5c57"><rect x="336" y="143" width="6" height="10" rx="3"/><rect x="347" y="137" width="6" height="16" rx="3"/><rect x="358" y="131" width="6" height="22" rx="3"/></g></g>
<g transform="translate(966 116)"><rect width="410" height="190" rx="30" fill="#fff" stroke="#dce1e8"/><text x="24" y="38" font-size="12" fill="#8b95a4">03</text><text x="24" y="68" font-size="15" font-weight="700">BREATHING</text><text x="24" y="94" font-size="12" fill="#7b8491">state becomes a quiet rhythm</text><rect x="24" y="120" width="362" height="48" rx="24" fill="url(#b)" stroke="#4c86ff"/><text x="44" y="149" font-size="14">Listening</text><g fill="none" stroke="#2875ff"><circle cx="356" cy="144" r="17"/><circle cx="356" cy="144" r="11"/><circle cx="356" cy="144" r="5" fill="#2875ff"/></g></g>
<g transform="translate(64 340)"><rect width="410" height="190" rx="30" fill="#fff" stroke="#dce1e8"/><text x="24" y="38" font-size="12" fill="#8b95a4">04</text><text x="24" y="68" font-size="15" font-weight="700">MAGNETIC</text><text x="24" y="94" font-size="12" fill="#7b8491">space assists without moving the target</text><rect x="24" y="120" width="362" height="48" rx="24" fill="url(#b)" stroke="#4c86ff"/><text x="44" y="149" font-size="14">Release to Send</text><g fill="none" stroke="#2875ff"><ellipse cx="350" cy="144" rx="27" ry="15"/><ellipse cx="350" cy="144" rx="18" ry="10"/><circle cx="356" cy="144" r="5" fill="#2875ff"/></g></g>
<g transform="translate(515 340)"><rect width="410" height="190" rx="30" fill="#fff" stroke="#dce1e8"/><text x="24" y="38" font-size="12" fill="#8b95a4">05</text><text x="24" y="68" font-size="15" font-weight="700">ETHICAL</text><text x="24" y="94" font-size="12" fill="#7b8491">friction matches human consequence</text><rect x="24" y="120" width="362" height="48" rx="24" fill="url(#r)" stroke="#ff5c57"/><text x="44" y="149" font-size="14">Hold for one breath</text><circle cx="356" cy="144" r="17" fill="none" stroke="#ff5c57"/><g fill="#ff5c57"><rect x="346" y="139" width="4" height="10" rx="2"/><rect x="353" y="135" width="4" height="18" rx="2"/><rect x="360" y="139" width="4" height="10" rx="2"/></g></g>
<g transform="translate(966 340)"><rect width="410" height="190" rx="30" fill="#fff" stroke="#dce1e8"/><text x="24" y="38" font-size="12" fill="#8b95a4">06</text><text x="24" y="68" font-size="15" font-weight="700">REVERSIBLE</text><text x="24" y="94" font-size="12" fill="#7b8491">recovery stays attached</text><rect x="24" y="120" width="362" height="48" rx="24" fill="url(#g)" stroke="#38d98b"/><text x="44" y="149" font-size="14">Undo Archive</text><g fill="#2875ff"><rect x="332" y="135" width="3" height="18"/><rect x="338" y="135" width="3" height="18"/><rect x="344" y="135" width="3" height="18"/><rect x="350" y="135" width="3" height="18"/><rect x="356" y="135" width="3" height="18"/><rect x="362" y="135" width="3" height="18"/></g></g></g></svg>